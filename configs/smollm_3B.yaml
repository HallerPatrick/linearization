description: "Attention Alignemnt Experiments"

training:
  model_name: "xllama"
  gradient_accumulation_steps: 1
  output_dir: "/vol/tmp/hallepat/subq_dataset"
  from_checkpoint: null
  # no rope
  # from_checkpoint: "/vol/tmp/hallepat/subq_dataset/run_20251126-1555/checkpoint-last"
  # rope
  # from_checkpoint: "/vol/tmp/hallepat/subq_dataset/run_20251126-1614/checkpoint-last"
  log_every_step: 10
  wandb_enabled: true
  wandb_project: "xqwen" # Insert WandB Project Name
  splits: "0.1|0.2|0.7"
  # splits: "0.05|0.15|0.80"
  # splits: "0.05|0.15|0.0"

  stage_1:
    lr: 2.5e-4
    lr_scheduler: "warmup_stable_decay"
    batch_size: 4
  stage_2:
    lr: 3e-4
    lr_scheduler: "cosine_with_warmup"
    batch_size: 4
  stage_3:
    lr: 4e-4
    lr_scheduler: "linear"
    batch_size: 4
    # ce_only_stage: True
    # ce_only_share: 0.5
    # extends_seq_length: True
    # extends: [1024, 2048, 4096]

model:
  context_length: 512
  copy_teacher_params: True
  freeze: False
  apply_rope: False
  # custom:
  #   head_dim: 256
  #   num_attention_heads: 8
  #   num_key_value_heads: 8

teacher_model:
  model_name: "HuggingFaceTB/SmolLM2-1.7B"
  use: True

dataset:
  output_path: /vol/tmp/hallepat/data/fineweb-3B-llama
  hugging_face_id: ["PatrickHaller/fineweb-3B"]
  # hugging_face_id: ["Salesforce/wikitext", "wikitext-2-v1"]
  split: "train"
  subset: "1.0"
  
tokenizer:
  type: "pretrained"
  pretrained_class: "llamatokenizer"
  pretrained_id: "HuggingFaceTB/SmolLM2-1.7B"


