description: "Attention Alignemnt Experiments"

training:
  model_name: "xlstm_qwen.qwen_xlstm"
  gradient_accumulation_steps: 1
  output_dir: "/vol/tmp2/hallepat/subq_dataset"
  # Normal heads
  # from_checkpoint: /vol/tmp2/hallepat/subq_dataset/run_20251222-2217/checkpoint-hidden-to-hidden
  #
  from_checkpoint: /vol/tmp/hallepat/qwen3_xlstm
  log_every_step: 10
  wandb_enabled: true
  wandb_project: "xqwen" # Insert WandB Project Name
  # splits: "0.026|0.053|0.92"
  # splits: "0.0|0.0|0.92"
  splits: "0.0|0.0|0.1"

  stage_1:
    lr: 2e-4
    lr_scheduler: "warmup_stable_decay"
    batch_size: 2
  stage_2:
    lr: 2e-4
    lr_scheduler: "warmup_stable_decay"
    batch_size: 1
  stage_3:
    lr: 1e-5
    lr_scheduler: "linear"
    batch_size: 6

model:
  context_length: 512
  copy_teacher_params: False
  freeze: True
  # extra_configs:
  #   num_attention_heads: 3

teacher_model:
  model_name: "Qwen/Qwen3-8B"
  use: False

dataset:
  output_path: /vol/tmp2/hallepat/data/fineweb-1B-xlstm-qwen
  hugging_face_id: ["PatrickHaller/fineweb-1B"]
  # hugging_face_id: ["Salesforce/wikitext", "wikitext-2-v1"]
  split: "train"
  subset: "1.0"
  
tokenizer:
  type: "pretrained"
  pretrained_class: "llamatokenizer"
  pretrained_id: "Qwen/Qwen3-8B"



