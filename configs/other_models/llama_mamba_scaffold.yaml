description: "Llama scaffold with FLA Mamba2 mixer (hard-coded mixer params)"

training:
  model_name: "mamba2.llama_mamba_scaffold"
  gradient_accumulation_steps: 1
  output_dir: "/vol/tmp2/hallepat/subq_dataset"
  from_checkpoint: null
  log_every_step: 10
  wandb_enabled: false
  wandb_project: "xqwen"
  splits: "0.0|0.0|0.1"
  optimizer: "adamw"
  lr_1d: null

  stage_1:
    lr: 2e-4
    lr_scheduler: "warmup_stable_decay"
    batch_size: 8
  stage_2:
    lr: 2e-3
    lr_scheduler: "warmup_stable_decay"
    batch_size: 8
  stage_3:
    lr: 3e-4
    lr_scheduler: "linear"
    batch_size: 32

model:
  context_length: 512
  copy_teacher_params: false
  freeze: false
  from_scratch: false
  extra_configs:
    mamba_state_size: 128
    mamba_expand: 1
    mamba_conv_kernel: 4
    mamba_hidden_act: "silu"
    mamba_use_bias: false
    mamba_use_conv_bias: true
    mamba_chunk_size: 256

teacher_model:
  model_name: "HuggingFaceTB/SmolLM2-135M"
  use: false

dataset:
  output_path: /vol/tmp2/hallepat/data/fineweb-3B-mamba
  hugging_face_id: ["PatrickHaller/fineweb-3B"]
  split: "train"
  subset: "1.0"

tokenizer:
  type: "pretrained"
  pretrained_class: "llamatokenizer"
  pretrained_id: "HuggingFaceTB/SmolLM2-135M"
