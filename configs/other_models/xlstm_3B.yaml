description: "Attention Alignemnt Experiments"

training:
  model_name: "xlstm.xlstm_llama"
  gradient_accumulation_steps: 1
  output_dir: "/vol/tmp2/hallepat/subq_dataset"
  # Normal heads
  # from_checkpoint: /vol/tmp2/hallepat/subq_dataset/run_20251222-2217/checkpoint-hidden-to-hidden
  #
  from_checkpoint: /vol/tmp2/hallepat/subq_dataset/run_20260103-2038/checkpoint-matrix-mixing
  log_every_step: 10
  wandb_enabled: true
  wandb_project: "xqwen" # Insert WandB Project Name
  # splits: "0.026|0.053|0.92"
  # splits: "0.0|0.0|0.92"
  splits: "0.0|0.1|0.0"

  stage_1:
    lr: 2e-4
    lr_scheduler: "warmup_stable_decay"
    batch_size: 2
  stage_2:
    lr: 2e-4
    lr_scheduler: "warmup_stable_decay"
    batch_size: 1
  stage_3:
    lr: 3e-4
    lr_scheduler: "linear"
    batch_size: 8

model:
  context_length: 512
  copy_teacher_params: True
  freeze: False
  # extra_configs:
  #   num_attention_heads: 3

teacher_model:
  model_name: "HuggingFaceTB/SmolLM3-3B-Base"
  use: True

dataset:
  output_path: /vol/tmp2/hallepat/data/fineweb-10B-xlstm
  hugging_face_id: ["PatrickHaller/fineweb-10B"]
  # hugging_face_id: ["Salesforce/wikitext", "wikitext-2-v1"]
  split: "train"
  subset: "1.0"
  
tokenizer:
  type: "pretrained"
  pretrained_class: "llamatokenizer"
  pretrained_id: "HuggingFaceTB/SmolLM3-3B-Base"



