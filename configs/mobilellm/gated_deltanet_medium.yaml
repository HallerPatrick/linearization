description: "Attention Alignemnt Experiments"

training:
  model_name: "gated_deltanet.llama_gated_deltanet"
  gradient_accumulation_steps: 1
  output_dir: "/vol/tmp2/hallepat/subq_dataset"
  from_checkpoint: /vol/tmp2/hallepat/subq_dataset/run_20260414-1403/checkpoint-hidden-to-hidden
  log_every_step: 10
  wandb_enabled: true
  wandb_project: "delta-boldt" # Insert WandB Project Name
  # splits: "0.026|0.053|0.92"
  splits: "0.0|0.0|0.92"
  # splits: "0.0|0.0|0.33"

  stage_1:
    lr: 2e-4
    lr_scheduler: "warmup_stable_decay"
    batch_size: 4
  stage_2:
    lr: 2e-3
    lr_scheduler: "warmup_stable_decay"
    batch_size: 4
  stage_3:
    lr: 2e-4
    lr_scheduler: "linear"
    batch_size: 6
    # ce_only_stage: True
    # ce_only_share: 0.5
    # extends_seq_length: True
    # extends: [1024, 2048, 4096]
    #
  use_cut_cross_entropy: True
  
  
  optimizer: "adamw"
  lr_1d: 0.007

  push_to_hub: "PatrickHaller/smollm_gdn_medium_2048"
  hub_private: True

  checkpoint_every: 13000

model:
  context_length: 2048
  copy_teacher_params: True
  freeze: False

teacher_model:
  model_name: "HuggingFaceTB/SmolLM2-360M"
  use: True

dataset:
  output_path: /vol/tmp2/hallepat/data/fineweb-3B-gd-medium
  hugging_face_id: ["PatrickHaller/fineweb-3B"]
  # hugging_face_id: ["Salesforce/wikitext", "wikitext-2-v1"]
  split: "train"
  subset: "1.0"
  
tokenizer:
  type: "pretrained"
  pretrained_class: "llamatokenizer"
  pretrained_id: "HuggingFaceTB/SmolLM2-360M"


